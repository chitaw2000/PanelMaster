<!DOCTYPE html>
<html>
<head>
    <title>Node Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html { scroll-behavior: smooth; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .glass-dark { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
        /* Health Badge Colors */
        .h-green { background: #ecfdf5; color: #10b981; border: 1px solid #a7f3d0; }
        .h-blue { background: #eff6ff; color: #3b82f6; border: 1px solid #bfdbfe; }
        .h-yellow { background: #fefce8; color: #eab308; border: 1px solid #fef08a; }
        .h-orange { background: #fff7ed; color: #f97316; border: 1px solid #fed7aa; }
        .h-red { background: #fef2f2; color: #ef4444; border: 1px solid #fecaca; }
    </style>
</head>
<body class="bg-[#f8fafc] font-sans pb-16 text-slate-800">

<nav class="bg-white/80 backdrop-blur-xl shadow-sm border-b border-slate-200/60 sticky top-0 z-40 mb-8">
    <div class="max-w-7xl mx-auto px-6 lg:px-8 py-4 flex justify-between items-center">
        <a href="/" class="text-sm font-bold text-slate-500 hover:text-indigo-600 transition flex items-center bg-slate-50 hover:bg-indigo-50 px-4 py-2 rounded-xl"><i class="fa-solid fa-arrow-left mr-2"></i> Dashboard</a>
        <div class="flex items-center gap-3">
            <button type="button" onclick="openHealthModal('{{ node_id }}', '{{ health }}')" class="h-{{ health }} hover:opacity-80 px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest transition-all shadow-sm flex items-center gap-1.5"><i class="fa-solid fa-circle text-[10px]"></i> Status: {{ health }}</button>
            <form action="/create_node_backup/{{ node_id }}" method="POST" class="m-0"><button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-xl text-xs font-bold transition shadow-md shadow-indigo-200"><i class="fa-solid fa-cloud-arrow-up mr-1.5"></i> Backup</button></form>
        </div>
    </div>
</nav>

<div class="max-w-7xl mx-auto px-6 lg:px-8">
    <div class="bg-white p-8 rounded-3xl shadow-[0_8px_30px_rgba(0,0,0,0.03)] border border-slate-100 mb-10">
        <div class="flex flex-col md:flex-row justify-between items-start gap-8">
            <div class="flex-1 w-full">
                <div class="flex items-center gap-3 mb-3"><span class="bg-slate-800 text-white font-mono text-[10px] px-2.5 py-1 rounded-md shadow-sm tracking-widest uppercase">ID: {{ node_id }}</span><h1 class="text-3xl font-black text-slate-900 tracking-tight">{{ node_name }}</h1></div>
                <p class="text-sm font-bold text-slate-500 flex items-center gap-2"><i class="fa-solid fa-globe text-indigo-400"></i> {{ node_ip }}</p>
            </div>
            
            <div class="w-full md:w-auto md:min-w-[300px] border-t md:border-t-0 md:border-l border-slate-100 pt-6 md:pt-0 md:pl-8 flex flex-col justify-center">
                <div class="flex justify-between items-end mb-2">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Total Traffic</p>
                    <p class="text-xs font-bold text-slate-400">{{ limit_tb }} TB Max</p>
                </div>
                <p class="text-3xl font-black tracking-tight {% if is_alarm %}text-red-500 animate-pulse{% else %}text-indigo-600{% endif %} mb-2">{{ "%.2f"|format(used_gb) }} <span class="text-sm font-bold text-slate-500">GB Used</span></p>
                <div class="w-full h-2 bg-slate-100 rounded-full overflow-hidden shadow-inner">
                    <div class="h-full {% if is_alarm %}bg-red-500{% else %}bg-indigo-500{% endif %} rounded-full transition-all duration-1000" style="width: {{ (used_gb / (limit_tb * 1024) * 100) if limit_tb > 0 else 0 }}%"></div>
                </div>
            </div>
        </div>
        
        <div class="bg-slate-50/80 border border-slate-100 rounded-2xl p-4 mt-8 flex flex-wrap items-center justify-between gap-4">
            <div class="flex flex-wrap items-center gap-3 w-full lg:w-auto">
                <span id="xrayStatusBadge" class="bg-white text-slate-400 border border-slate-200 px-4 py-2.5 rounded-xl font-bold shadow-sm text-xs flex items-center gap-2 w-full sm:w-auto justify-center"><i class="fa-solid fa-circle-notch fa-spin"></i> Checking</span>
                <div class="bg-white border border-slate-200 rounded-xl px-4 py-2.5 flex items-center justify-center gap-2.5 shadow-sm w-full sm:w-auto">
                    <label class="relative inline-flex items-center cursor-pointer"><input type="checkbox" id="speedToggle" class="sr-only peer" onchange="toggleSpeedMonitor()"><div class="w-8 h-4 bg-slate-200 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border after:border-slate-300 after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-emerald-500 peer-checked:after:border-white shadow-inner"></div></label>
                    <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Live Speed</span>
                </div>
            </div>
            
            <div class="flex flex-wrap items-center gap-3 w-full lg:w-auto">
                <form action="/restart_xray/{{ node_id }}" method="POST" class="m-0 flex-1 sm:flex-none"><button type="submit" class="w-full bg-white border border-indigo-100 text-indigo-600 px-4 py-2.5 rounded-xl text-xs font-bold hover:bg-indigo-50 hover:border-indigo-200 transition shadow-sm flex items-center justify-center"><i class="fa-solid fa-rotate-right mr-1.5"></i> Restart</button></form>
                <button onclick="document.getElementById('replaceIdModal').classList.remove('hidden')" class="flex-1 sm:flex-none bg-amber-500 hover:bg-amber-600 text-white px-4 py-2.5 rounded-xl text-xs font-bold shadow-md transition flex items-center justify-center"><i class="fa-solid fa-wand-magic-sparkles mr-1.5"></i> Restore</button>
                <form action="/delete_node/{{ node_id }}" method="POST" onsubmit="return confirm('Disconnect this server?');" class="m-0 flex-1 sm:flex-none"><button class="w-full bg-red-50 hover:bg-red-500 text-red-500 hover:text-white px-4 py-2.5 rounded-xl text-xs font-bold border border-red-100 hover:border-red-500 transition-colors shadow-sm flex items-center justify-center"><i class="fa-solid fa-link-slash mr-1.5"></i> Disconnect</button></form>
                <button onclick="document.getElementById('addUserModal').classList.remove('hidden')" class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-xl text-sm font-bold shadow-lg shadow-indigo-200 transition hover:-translate-y-0.5 flex items-center justify-center"><i class="fa-solid fa-plus mr-2"></i> Add Key</button>
            </div>
        </div>
    </div>

    <div id="setHealthModal" class="hidden fixed inset-0 glass-dark flex items-center justify-center p-4 z-[80] transition-all">
        <div class="bg-white rounded-3xl p-8 w-80 shadow-2xl border border-slate-100 transform scale-100">
            <h2 class="text-xl font-black mb-2 text-slate-800">Set Node Health</h2>
            <p class="text-xs text-slate-500 mb-6 font-bold">Assign status for <span id="healthNodeId" class="text-indigo-600 uppercase font-black"></span></p>
            <form id="setHealthForm" method="POST">
                <div class="space-y-2 mb-8">
                    <label class="flex items-center gap-3 p-3 rounded-xl cursor-pointer hover:bg-emerald-50 transition border border-transparent hover:border-emerald-100">
                        <input type="radio" name="health" value="green" class="w-4 h-4 text-emerald-600 focus:ring-emerald-500">
                        <span class="h-green px-3 py-1 rounded-md text-[10px] font-black uppercase tracking-widest flex items-center gap-2"><i class="fa-solid fa-circle text-[8px]"></i> Green (Good)</span>
                    </label>
                    <label class="flex items-center gap-3 p-3 rounded-xl cursor-pointer hover:bg-blue-50 transition border border-transparent hover:border-blue-100">
                        <input type="radio" name="health" value="blue" class="w-4 h-4 text-blue-600 focus:ring-blue-500">
                        <span class="h-blue px-3 py-1 rounded-md text-[10px] font-black uppercase tracking-widest flex items-center gap-2"><i class="fa-solid fa-circle text-[8px]"></i> Blue (Maintain)</span>
                    </label>
                    <label class="flex items-center gap-3 p-3 rounded-xl cursor-pointer hover:bg-yellow-50 transition border border-transparent hover:border-yellow-100">
                        <input type="radio" name="health" value="yellow" class="w-4 h-4 text-yellow-500 focus:ring-yellow-500">
                        <span class="h-yellow px-3 py-1 rounded-md text-[10px] font-black uppercase tracking-widest flex items-center gap-2"><i class="fa-solid fa-circle text-[8px]"></i> Yellow (Slow)</span>
                    </label>
                    <label class="flex items-center gap-3 p-3 rounded-xl cursor-pointer hover:bg-orange-50 transition border border-transparent hover:border-orange-100">
                        <input type="radio" name="health" value="orange" class="w-4 h-4 text-orange-500 focus:ring-orange-500">
                        <span class="h-orange px-3 py-1 rounded-md text-[10px] font-black uppercase tracking-widest flex items-center gap-2"><i class="fa-solid fa-circle text-[8px]"></i> Orange (Critical)</span>
                    </label>
                    <label class="flex items-center gap-3 p-3 rounded-xl cursor-pointer hover:bg-red-50 transition border border-transparent hover:border-red-100">
                        <input type="radio" name="health" value="red" class="w-4 h-4 text-red-600 focus:ring-red-500">
                        <span class="h-red px-3 py-1 rounded-md text-[10px] font-black uppercase tracking-widest flex items-center gap-2"><i class="fa-solid fa-circle text-[8px]"></i> Red (Dead)</span>
                    </label>
                </div>
                <div class="flex justify-end gap-3">
                    <button type="button" onclick="document.getElementById('setHealthModal').classList.add('hidden')" class="px-5 py-2.5 font-bold text-slate-500 hover:text-slate-800 transition">Cancel</button>
                    <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-xl font-bold shadow-md shadow-indigo-200 transition">Save Status</button>
                </div>
            </form>
        </div>
    </div>

<script>
function openHealthModal(nodeId, currentHealth) {
    document.getElementById('healthNodeId').innerText = nodeId;
    const form = document.getElementById('setHealthForm');
    form.action = "/set_node_health/" + nodeId;
    const radios = form.querySelectorAll('input[name="health"]');
    radios.forEach(r => { r.checked = (r.value === currentHealth); });
    document.getElementById('setHealthModal').classList.remove('hidden');
}
</script>
