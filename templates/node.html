<!DOCTYPE html>
<html>
<head>
    <title>Node Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html { scroll-behavior: smooth; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .glass-dark { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
    </style>
</head>
<body class="bg-[#f8fafc] font-sans pb-16 text-slate-800">

<nav class="bg-white/80 backdrop-blur-xl shadow-sm border-b border-slate-200/60 sticky top-0 z-40 mb-8">
    <div class="max-w-7xl mx-auto px-6 lg:px-8 py-4 flex justify-between items-center">
        <a href="/" class="text-sm font-bold text-slate-500 hover:text-indigo-600 transition flex items-center bg-slate-50 hover:bg-indigo-50 px-4 py-2 rounded-xl"><i class="fa-solid fa-arrow-left mr-2"></i> Dashboard</a>
        <form action="/create_node_backup/{{ node_id }}" method="POST" class="m-0"><button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-xl text-xs font-bold transition shadow-md shadow-indigo-200"><i class="fa-solid fa-cloud-arrow-up mr-1.5"></i> Backup</button></form>
    </div>
</nav>

<div class="max-w-7xl mx-auto px-6 lg:px-8">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-10 gap-6 bg-white p-8 rounded-3xl shadow-[0_8px_30px_rgba(0,0,0,0.03)] border border-slate-100">
        <div class="flex-1 w-full">
            <div class="flex flex-col sm:flex-row justify-between items-start gap-6">
                <div>
                    <div class="flex items-center gap-3 mb-3"><span class="bg-slate-800 text-white font-mono text-[10px] px-2.5 py-1 rounded-md shadow-sm tracking-widest uppercase">ID: {{ node_id }}</span><h1 class="text-3xl font-black text-slate-900 tracking-tight">{{ node_name }}</h1></div>
                    <p class="text-sm font-bold text-slate-500 flex items-center gap-2"><i class="fa-solid fa-globe text-indigo-400"></i> {{ node_ip }}</p>
                </div>
                
                <div class="text-right sm:border-l border-slate-100 sm:pl-8">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Total Node Traffic</p>
                    <p class="text-2xl font-black tracking-tight {% if is_alarm %}text-red-500 animate-pulse{% else %}text-indigo-600{% endif %}">{{ "%.2f"|format(used_gb) }} <span class="text-sm font-bold">GB</span> <span class="text-sm text-slate-300 mx-1">/</span> <span class="text-lg text-slate-400">{{ limit_tb }} <span class="text-xs">TB</span></span></p>
                    {% if is_alarm %}<p class="text-[10px] font-black text-red-500 mt-1.5 uppercase tracking-wider bg-red-50 inline-block px-2 py-0.5 rounded">Limit Reached!</p>{% endif %}
                </div>
            </div>
        </div>
        
        <div class="flex gap-3 items-center flex-wrap justify-end w-full md:w-auto mt-2 md:mt-0 pt-6 md:pt-0 border-t md:border-t-0 border-slate-100">
            <span id="xrayStatusBadge" class="bg-slate-50 text-slate-400 border border-slate-200 px-4 py-2.5 rounded-xl font-bold shadow-sm text-xs flex items-center gap-2"><i class="fa-solid fa-circle-notch fa-spin"></i> Checking</span>
            <form action="/restart_xray/{{ node_id }}" method="POST" class="m-0"><button type="submit" class="bg-white border border-indigo-100 text-indigo-600 px-4 py-2.5 rounded-xl text-xs font-bold hover:bg-indigo-50 hover:border-indigo-200 transition shadow-sm"><i class="fa-solid fa-rotate-right mr-1.5"></i> Restart Xray</button></form>
            
            <div class="bg-white border border-slate-200 rounded-xl px-4 py-2.5 flex items-center gap-2.5 shadow-sm ml-auto sm:ml-2"><label class="relative inline-flex items-center cursor-pointer"><input type="checkbox" id="speedToggle" class="sr-only peer" onchange="toggleSpeedMonitor()"><div class="w-8 h-4 bg-slate-200 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border after:border-slate-300 after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-emerald-500 peer-checked:after:border-white shadow-inner"></div></label><span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Live Speed</span></div>
            <button onclick="document.getElementById('replaceIdModal').classList.remove('hidden')" class="bg-amber-500 hover:bg-amber-600 text-white w-10 h-10 rounded-xl font-bold shadow-md transition flex items-center justify-center" title="Restore Server"><i class="fa-solid fa-wand-magic-sparkles"></i></button>
            <form action="/delete_node/{{ node_id }}" method="POST" onsubmit="return confirm('Disconnect this server?');" class="m-0"><button class="bg-red-50 hover:bg-red-500 text-red-500 hover:text-white w-10 h-10 rounded-xl font-bold border border-red-100 hover:border-red-500 transition-colors shadow-sm flex items-center justify-center" title="Disconnect Server"><i class="fa-solid fa-link-slash"></i></button></form>
            <button onclick="document.getElementById('addUserModal').classList.remove('hidden')" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-xl text-sm font-bold shadow-lg shadow-indigo-200 transition hover:-translate-y-0.5 ml-2"><i class="fa-solid fa-plus mr-2"></i> Add Key</button>
        </div>
    </div>

    <form id="bulkForm" action="/bulk_delete" method="POST" onsubmit="return confirm('Delete selected keys?');">
        <input type="hidden" name="node_name" value="{{ node_id }}">
        
        <div id="bulkActions" class="hidden mb-6 p-4 bg-red-50 border border-red-100 rounded-2xl flex justify-between items-center transition-all shadow-sm">
            <span class="text-sm font-black text-red-600"><span id="selCount" class="bg-white px-2 py-0.5 rounded shadow-sm mr-1">0</span> keys selected</span>
            <button type="submit" class="bg-red-500 hover:bg-red-600 text-white px-6 py-2.5 rounded-xl text-xs font-bold shadow-md transition hover:-translate-y-0.5"><i class="fa-solid fa-trash-can mr-2"></i> Delete Selected</button>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-x-auto"><table class="w-full text-left whitespace-nowrap">
        <thead><tr class="bg-slate-50/80 border-b border-slate-200 text-[10px] font-black uppercase tracking-widest text-slate-500">
        <th class="p-6 w-10 text-center"><input type="checkbox" id="selectAll" class="w
